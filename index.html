<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMPEL GAMBAR JADI LINK</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #eee; padding: 15px; margin: 0; box-sizing: border-box; height: 100vh; display: flex; flex-direction: column; }
        h2 { text-align: center; color: #007bff; margin: 10px 0 20px 0; }
        
        /* Layout Utama: Kiri (Daftar Link) & Kanan (Grid Card) */
        .main-layout {
            display: flex;
            gap: 15px;
            flex: 1;
            overflow: hidden;
            padding-bottom: 10px;
        }

        /* Panel Kiri untuk List Semua Link */
        .sidebar-links {
            width: 25%;
            min-width: 250px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-title {
            font-size: 12px;
            font-weight: bold;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .links-output {
            width: 100%;
            flex: 1;
            background: #000;
            border: 1px solid #333;
            color: #00ff00;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            resize: none;
            outline: none;
        }

        /* Panel Kanan untuk Grid Card */
        .content-grid {
            width: 75%;
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            max-width: 100%;
        }

        .card {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: border-color 0.2s;
        }

        .card:focus-within { border-color: #007bff; box-shadow: 0 0 8px rgba(0,123,255,0.3); }

        .preview {
            width: 100%;
            height: 100px;
            background: #2a2a2a;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 10px;
            color: #666;
            cursor: pointer;
            border: 1px dashed #444;
        }

        .preview img { width: 100%; height: 100%; object-fit: cover; }
        
        input {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            background: #000;
            border: 1px solid #333;
            color: #00ff00;
            border-radius: 4px;
            font-size: 10px;
            outline: none;
            text-align: center;
        }

        .btn-copy {
            background: #007bff;
            color: white;
            border: none;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }

        .btn-copy:active { background: #0056b3; transform: scale(0.98); }

        .slot-label {
            font-size: 10px;
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>TEMPEL LANGSUNG AJA NANTI MUNCUL LINK DIBAWAH DAN DI LAYAR KIRI</h2>
    
    <div class="main-layout">
        <!-- SEBELAH KIRI: Tempat Kumpulan Link Gambar (MURNI LINK SAJA) -->
        <div class="sidebar-links">
            <div class="sidebar-title">📋 Semua Hasil Dibawa Ini BRAY!!!</div>
            <textarea id="all-links-textarea" class="links-output" placeholder="Link akan otomatis terkumpul di sini..." readonly></textarea>
        </div>

        <!-- SEBELAH KANAN: Grid Card Tempel Gambar -->
        <div class="content-grid">
            <div class="grid" id="container">
                <!-- 50 Cards generated by JavaScript -->
            </div>
        </div>
    </div>

<script>
    const API_KEY = 'd7095fa9b829691dca438585646a7ed2';
    const container = document.getElementById('container');
    const allLinksTextarea = document.getElementById('all-links-textarea');
    const totalCards = 50; 

    // Object untuk menampung link berdasarkan nomor slot (agar tetap berurutan dari slot kecil ke besar)
    const uploadedLinks = {};

    // Fungsi untuk memperbarui tampilan teks di layar sebelah kiri (Murni Link Saja)
    function updateLeftSidebar() {
        let textResult = "";
        for (let i = 1; i <= totalCards; i++) {
            if (uploadedLinks[i]) {
                textResult += `${uploadedLinks[i]}\n`; // <--- Bagian ini sudah dipotong kata SLOT-nya bray
            }
        }
        allLinksTextarea.value = textResult;
    }

    for (let i = 1; i <= totalCards; i++) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="slot-label">SLOT ${i}</div>
            <div class="preview" tabindex="0">PASTE HERE</div>
            <input type="text" class="link-val" placeholder="..." readonly>
            <button class="btn-copy">COPY</button>
        `;
        container.appendChild(card);

        const previewArea = card.querySelector('.preview');
        const inputField = card.querySelector('.link-val');
        const copyBtn = card.querySelector('.btn-copy');

        // Logic Paste
        card.addEventListener('paste', async (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.type.indexOf("image") !== -1) {
                    const blob = item.getAsFile();
                    
                    // Show local preview fast
                    const reader = new FileReader();
                    reader.onload = (ev) => { 
                        previewArea.innerHTML = `<img src="${ev.target.result}">`;
                        previewArea.style.border = "none";
                    };
                    reader.readAsDataURL(blob);

                    // Start Uploading
                    inputField.value = "UPLOADING...";
                    const formData = new FormData();
                    formData.append('image', blob);

                    try {
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                            method: 'POST',
                            body: formData
                        });
                        const data = await res.json();
                        if (data.success) {
                            const finalUrl = data.data.url;
                            
                            // Masukkan ke input field bawah card
                            inputField.value = finalUrl;
                            
                            // Masukkan ke penampung data
                            uploadedLinks[i] = finalUrl;
                            
                            // Perbarui daftar di sebelah kiri bray
                            updateLeftSidebar();
                        }
                    } catch (err) {
                        inputField.value = "ERR!";
                    }
                }
            }
        });

        // Silent Copy Logic
        copyBtn.addEventListener('click', () => {
            const val = inputField.value;
            if (val && val !== "UPLOADING..." && val !== "ERR!") {
                inputField.select();
                navigator.clipboard.writeText(val);
            }
        });

        // Click input to auto-select
        inputField.addEventListener('click', () => inputField.select());
    }

    // Klik area teks sebelah kiri untuk langsung auto-select semua teks
    allLinksTextarea.addEventListener('click', () => allLinksTextarea.select());
</script>

</body>
</html>
